<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>btBasics – Intro Animation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh}
.phone{position:relative;width:240px;height:480px;border-radius:32px;overflow:hidden;border:2px solid #0F6E56;flex-shrink:0}
#c{position:absolute;top:0;left:0}
</style>
</head>
<body>
<div class="phone"><canvas id="c" width="240" height="480"></canvas></div>
<script>
(function(){
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=240,H=480,LOOP=300,FPS=60;
let frame=0,lastTs=0;
let particles=[],trucks=[],nextTruck=71;
let parkTruck=null,conBounce=false;

const floors=7,floorH=22,bw=96,bx=72,groundY=370,roofY=370-154;
const craneX=bx+bw+14,craneTop=roofY-30;
const CON_W=38,CON_H=18,CON_X=12,CON_LAND_Y=groundY-CON_H;
const PARK_X=craneX-23;
const CRACK_START=164;

const crackMain=[
  [bx+8,roofY+6],[bx+4,roofY+12],[bx+9,roofY+18],
  [bx+5,roofY+24],[bx+10,roofY+31],[bx+6,roofY+38],
  [bx+11,roofY+45],[bx+7,roofY+52]
];
const crackB1=[[bx+5,roofY+24],[bx+1,roofY+30],[bx+3,roofY+36],[bx+0,roofY+42]];
const crackB2=[[bx+10,roofY+31],[bx+14,roofY+37],[bx+12,roofY+43]];

const stars=Array.from({length:50},()=>({x:Math.random()*W,y:Math.random()*H*.55,r:Math.random()*.7+.3,tw:Math.random()*Math.PI*2}));

function lerp(a,b,t){return a+(b-a)*Math.min(1,Math.max(0,t))}
function ease(t){t=Math.min(1,Math.max(0,t));return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function addP(x,y,n){for(let i=0;i<(n||3);i++)particles.push({x,y,vx:(Math.random()-.5)*2.5,vy:-Math.random()*2.5-.5,life:1});}
function reset(){frame=0;particles=[];trucks=[];nextTruck=71;parkTruck=null;conBounce=false;}

function drawPath(pts,prog,lw,col){
  if(prog<=0||pts.length<2)return;
  const segs=pts.length-1,show=prog*segs;
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=0;i<segs;i++){
    const sp=Math.min(1,Math.max(0,show-i));
    if(sp<=0)break;
    ctx.lineTo(pts[i][0]+(pts[i+1][0]-pts[i][0])*sp,pts[i][1]+(pts[i+1][1]-pts[i][1])*sp);
  }
  ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
}

function drawCracks(p){
  ctx.save();
  drawPath(crackMain,p,.9,'rgba(0,0,0,.65)');
  drawPath(crackB1,Math.max(0,(p-.35)/.65),.6,'rgba(0,0,0,.55)');
  drawPath(crackB2,Math.max(0,(p-.55)/.45),.5,'rgba(0,0,0,.5)');
  drawPath(crackMain,p,.3,'rgba(200,255,180,.15)');
  ctx.restore();
}

function drawTruck(x){
  const y=groundY,tw=34,cw=12,th=14,ch=10;
  ctx.fillStyle='#1a5c30';ctx.fillRect(x,y-th,tw,th);
  ctx.strokeStyle='rgba(100,255,150,.2)';ctx.lineWidth=.5;ctx.strokeRect(x,y-th,tw,th);
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(x+i*tw/4,y-th);ctx.lineTo(x+i*tw/4,y);ctx.strokeStyle='rgba(80,200,120,.15)';ctx.stroke();}
  ctx.fillStyle='#0F6E56';ctx.fillRect(x+tw,y-ch,cw,ch);
  ctx.strokeStyle='rgba(100,255,150,.3)';ctx.lineWidth=.5;ctx.strokeRect(x+tw,y-ch,cw,ch);
  ctx.fillStyle='rgba(150,255,200,.13)';ctx.fillRect(x+tw+2,y-ch+2,cw-5,ch-5);
  [[x+7,y],[x+tw-6,y],[x+tw+3,y],[x+tw+cw-3,y]].forEach(([wx,wy])=>{
    ctx.beginPath();ctx.arc(wx,wy,3.5,0,Math.PI*2);ctx.fillStyle='#0a2010';ctx.fill();
    ctx.strokeStyle='rgba(100,200,120,.35)';ctx.lineWidth=.5;ctx.stroke();
    ctx.beginPath();ctx.arc(wx,wy,1.2,0,Math.PI*2);ctx.fillStyle='rgba(100,200,120,.3)';ctx.fill();
  });
  ctx.beginPath();ctx.arc(x+tw+cw,y-ch*.4,2,0,Math.PI*2);ctx.fillStyle='rgba(200,255,180,.4)';ctx.fill();
}

function drawContainer(){
  if(frame<6)return;
  const t=(frame-6)/9;
  let cy=t<1?CON_LAND_Y-28+28*ease(t):CON_LAND_Y-Math.sin(Math.min(1,(frame-15)/10)*Math.PI)*5*(1-Math.min(1,(frame-15)/10));
  if(t>=1&&!conBounce){conBounce=true;addP(CON_X+CON_W*.5,groundY,18);addP(CON_X-4,groundY,6);addP(CON_X+CON_W+4,groundY,6);}
  const df=Math.min(1,Math.max(0,t));
  ctx.fillStyle=`rgba(0,0,0,${df*.28})`;
  ctx.beginPath();ctx.ellipse(CON_X+CON_W/2,groundY+1,CON_W*.44*(.3+df*.7),2.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a5535';ctx.fillRect(CON_X,cy,CON_W,CON_H);
  ctx.strokeStyle='rgba(100,200,130,.3)';ctx.lineWidth=.4;
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(CON_X+i*CON_W/4,cy);ctx.lineTo(CON_X+i*CON_W/4,cy+CON_H);ctx.stroke();}
  ctx.strokeStyle='rgba(80,220,130,.45)';ctx.lineWidth=.8;ctx.strokeRect(CON_X,cy,CON_W,CON_H);
  ctx.fillStyle='rgba(100,220,140,.1)';ctx.fillRect(CON_X+1,cy+1,CON_W-2,3);
  ctx.strokeStyle='rgba(80,200,120,.3)';ctx.lineWidth=.5;
  ctx.beginPath();ctx.moveTo(CON_X+CON_W*.48,cy+2);ctx.lineTo(CON_X+CON_W*.48,cy+CON_H-2);ctx.stroke();
  ctx.fillStyle='rgba(100,220,140,.5)';
  ctx.fillRect(CON_X+CON_W*.4,cy+CON_H*.42,3,3);ctx.fillRect(CON_X+CON_W*.52,cy+CON_H*.42,3,3);
}

function draw(ts){
  requestAnimationFrame(draw);
  if(ts-lastTs<1000/FPS)return;
  lastTs=ts;
  if(frame>=LOOP)reset();
  ctx.clearRect(0,0,W,H);

  const st=Math.min(1,frame/180);
  const sg=ctx.createLinearGradient(0,0,0,groundY);
  sg.addColorStop(0,`rgb(${lerp(2,4,st)},${lerp(4,14,st)},${lerp(6,10,st)})`);
  sg.addColorStop(1,`rgb(${lerp(8,16,st)},${lerp(16,45,st)},${lerp(10,16,st)})`);
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,groundY);

  const sa=Math.max(0,1-frame/104);
  stars.forEach(s=>{s.tw+=.04;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,255,210,${sa*(.4+Math.sin(s.tw)*.3)})`;ctx.fill();});

  if(frame>33){
    const sunT=ease((frame-33)/160);
    const sy=groundY*.9-sunT*groundY*.72,sx=W*.73;
    const gr=ctx.createRadialGradient(sx,sy,0,sx,sy,30);
    gr.addColorStop(0,`rgba(15,180,90,${sunT*.3})`);gr.addColorStop(1,'rgba(15,110,56,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(sx,sy,30,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx,sy,10,0,Math.PI*2);ctx.fillStyle=`rgba(20,200,100,${sunT*.75})`;ctx.fill();
  }

  for(let x=-H;x<W+H;x+=16){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+H,H);ctx.strokeStyle='rgba(15,110,86,0.055)';ctx.lineWidth=.5;ctx.stroke();}

  const gg=ctx.createLinearGradient(0,groundY,0,H);
  gg.addColorStop(0,'#163a16');gg.addColorStop(1,'#091409');
  ctx.fillStyle=gg;ctx.fillRect(0,groundY,W,H-groundY);
  ctx.strokeStyle='rgba(15,110,86,.4)';ctx.lineWidth=.5;
  ctx.beginPath();ctx.moveTo(0,groundY);ctx.lineTo(W,groundY);ctx.stroke();

  const floorsVis=Math.min(floors,Math.floor(frame/14));
  for(let f=0;f<floorsVis;f++){
    const fp=Math.min(1,(frame-f*14)/12);
    const fy=groundY-(f+1)*floorH,fh=floorH-1,drawH=fh*fp;
    const fg=ctx.createLinearGradient(bx,0,bx+bw,0);
    fg.addColorStop(0,'#0c5233');fg.addColorStop(.5,'#0F6E56');fg.addColorStop(1,'#0a4229');
    ctx.fillStyle=fg;ctx.fillRect(bx,fy+(fh-drawH),bw,drawH);
    ctx.strokeStyle='rgba(30,200,120,.2)';ctx.lineWidth=.5;ctx.strokeRect(bx,fy,bw,fh);
    if(fp>.6){
      const wa=(fp-.6)/.4;
      [[bx+bw*.1,bw*.22],[bx+bw*.42,bw*.22],[bx+bw*.72,bw*.18]].forEach(([wx,ww])=>{
        ctx.fillStyle=`rgba(120,255,180,${wa*.07})`;ctx.fillRect(wx,fy+fh*.18,ww,fh*.6);
        ctx.strokeStyle=`rgba(100,255,170,${wa*.3})`;ctx.lineWidth=.4;ctx.strokeRect(wx,fy+fh*.18,ww,fh*.6);
        ctx.beginPath();ctx.moveTo(wx+ww/2,fy+fh*.18);ctx.lineTo(wx+ww/2,fy+fh*.78);ctx.strokeStyle=`rgba(100,255,170,${wa*.15})`;ctx.stroke();
      });
    }
    if(f===floorsVis-1&&fp<.9&&frame%3===0)addP(bx+Math.random()*bw,fy+fh*.5,2);
  }

  if(floorsVis>=floors){
    const rt=Math.min(1,(frame-floors*14)/15);
    ctx.save();ctx.globalAlpha=rt;
    ctx.fillStyle='#0F6E56';ctx.fillRect(bx-3,roofY-5,bw+6,6);
    ctx.strokeStyle='rgba(100,255,170,.3)';ctx.lineWidth=.5;ctx.strokeRect(bx-3,roofY-5,bw+6,6);
    ctx.strokeStyle='rgba(100,255,170,.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(bx+bw*.5,roofY-5);ctx.lineTo(bx+bw*.5,roofY-18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+bw*.5-5,roofY-14);ctx.lineTo(bx+bw*.5+5,roofY-14);ctx.stroke();
    ctx.restore();
  }

  if(frame>=CRACK_START&&floorsVis>=floors){
    drawCracks(Math.min(1,(frame-CRACK_START)/45));
  }

  if(frame>7){
    const ct=Math.min(1,(frame-7)/20);
    ctx.save();ctx.globalAlpha=ct;
    ctx.strokeStyle='rgba(80,210,140,.55)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(craneX,groundY);ctx.lineTo(craneX,craneTop);ctx.stroke();
    ctx.lineWidth=.4;ctx.strokeStyle='rgba(80,210,140,.25)';
    for(let i=0;i<6;i++){const y1=groundY-i*(groundY-craneTop)/6,y2=groundY-(i+1)*(groundY-craneTop)/6;ctx.beginPath();ctx.moveTo(craneX-3,y1);ctx.lineTo(craneX+3,y2);ctx.stroke();}
    ctx.lineWidth=1.2;ctx.strokeStyle='rgba(80,210,140,.55)';
    ctx.beginPath();ctx.moveTo(craneX,craneTop);ctx.lineTo(craneX+38,craneTop+6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(craneX,craneTop);ctx.lineTo(craneX-12,craneTop+4);ctx.stroke();
    ctx.fillStyle='rgba(15,90,60,.9)';ctx.fillRect(craneX-20,craneTop+2,12,8);
    const swing=Math.sin(frame*.025)*10,hx=craneX+28+swing,clen=Math.min(48,(frame-7)*1.8);
    ctx.setLineDash([2,3]);ctx.lineWidth=.5;ctx.strokeStyle='rgba(80,210,140,.4)';
    ctx.beginPath();ctx.moveTo(hx,craneTop+6);ctx.lineTo(hx,craneTop+6+clen);ctx.stroke();
    ctx.setLineDash([]);
    if(clen>8){ctx.beginPath();ctx.arc(hx,craneTop+6+clen,2.5,0,Math.PI*2);ctx.fillStyle='rgba(100,255,170,.7)';ctx.fill();}
    ctx.restore();
  }

  if(frame>=nextTruck&&frame<178){trucks.push({x:-50,speed:1.5+Math.random()*.4});nextTruck=frame+55+Math.floor(Math.random()*20);}
  if(frame===178&&!parkTruck)parkTruck={x:-50,speed:2.1,parked:false};
  if(parkTruck&&!parkTruck.parked){
    const dist=PARK_X-parkTruck.x;
    if(dist>1){parkTruck.speed=dist<60?Math.max(0.05,parkTruck.speed*.93):parkTruck.speed;parkTruck.x+=parkTruck.speed;}
    else{parkTruck.x=PARK_X;parkTruck.parked=true;}
  }
  for(let i=trucks.length-1;i>=0;i--){const t=trucks[i];t.x+=t.speed;drawTruck(t.x);if(t.x>W+60)trucks.splice(i,1);}
  if(parkTruck)drawTruck(parkTruck.x);

  drawContainer();

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.025;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.beginPath();ctx.arc(p.x,p.y,1.5*p.life,0,Math.PI*2);ctx.fillStyle=`rgba(100,255,170,${p.life*.5})`;ctx.fill();
  }

  if(frame>68){
    const tt=Math.min(1,(frame-68)/22);
    ctx.save();ctx.globalAlpha=tt;
    [[W-16,groundY,28],[W-6,groundY,20]].forEach(([tx,ty,th])=>{
      ctx.fillStyle='#0a3210';ctx.beginPath();
      ctx.moveTo(tx,ty);ctx.lineTo(tx-7,ty-th*.45);ctx.lineTo(tx-3.5,ty-th*.45);
      ctx.lineTo(tx-5,ty-th*.8);ctx.lineTo(tx-2,ty-th*.8);ctx.lineTo(tx,ty-th);
      ctx.lineTo(tx+2,ty-th*.8);ctx.lineTo(tx+5,ty-th*.8);ctx.lineTo(tx+3.5,ty-th*.45);
      ctx.lineTo(tx+7,ty-th*.45);ctx.closePath();ctx.fill();
    });
    ctx.restore();
  }

  if(frame>221){
    const lt=Math.min(1,(frame-221)/28);
    const lo=frame>264?Math.max(0,1-(frame-264)/28):lt;
    ctx.fillStyle=`rgba(3,8,4,${lo*.85})`;ctx.fillRect(0,0,W,H);
    ctx.save();ctx.globalAlpha=lo;ctx.textAlign='center';
    ctx.font='bold 26px system-ui,sans-serif';ctx.fillStyle='#0F6E56';
    ctx.fillText('btBasics',W/2,H*.42);
    ctx.font='11px monospace';ctx.fillStyle='rgba(159,225,203,.85)';
    ctx.fillText('mobiles protokoll.',W/2,H*.42+32);
    ctx.restore();
  }

  frame++;
}
requestAnimationFrame(draw);
})();
</script>
</body>
</html>
